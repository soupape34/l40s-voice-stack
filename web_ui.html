<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;

    /* State palette */
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);

    /* Active state (set by JS) */
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);

    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background radial glow ── */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 720px;
    padding: 20px 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .model-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg {
    width: 10px;
    height: 10px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  /* ── Main stack ── */
  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  /* ── Audio orb (replaces webcam viewport) ── */
  .viewport-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Three glow layers */
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  /* Layer 1 — tight inner glow */
  .viewport-wrap::before {
    box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim);
    z-index: 3;
    animation: glow-breathe-1 3s ease-in-out infinite;
  }

  /* Layer 2 — mid spread */
  .viewport-wrap::after {
    box-shadow: 0 0 40px 8px var(--glow-dim);
    z-index: 2;
    animation: glow-breathe-2 4s ease-in-out infinite;
  }

  /* Layer 3 — outer diffuse */
  .viewport-glow {
    inset: -6px;
    border-radius: 50%;
    box-shadow: 0 0 80px 20px var(--glow-dim);
    z-index: 1;
    animation: glow-breathe-3 5s ease-in-out infinite;
  }

  .audio-orb {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08), #0a0a10 70%);
    position: relative;
    z-index: 2;
    font-size: 48px;
    user-select: none;
  }

  /* State: listening — gentle breathe */
  @keyframes glow-breathe-1 {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes glow-breathe-2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes glow-breathe-3 {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* State: processing — faster, tighter */
  .viewport-wrap.processing::before { animation-duration: 0.8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: 0.3; }

  /* State: speaking — smooth pulse driven by JS amplitude */
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow {
    animation: none;
  }

  /* State: loading — very slow, dim */
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: 0.3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: 0.2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: 0.1; }

  /* ── Waveform canvas ── */
  .waveform-wrap {
    width: 100%;
    max-width: 480px;
    height: 52px;
    margin-top: 16px;
    flex-shrink: 0;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Transcript ── */
  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
    mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
  }

  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 85%;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(74,222,128,0.08);
    color: #b0d8c0;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10.5px;
    color: var(--c-text-dim);
    margin-top: 5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .tool-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .tool-chip {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 100px;
    background: rgba(129,140,248,0.12);
    color: #a5b4fc;
    letter-spacing: 0.02em;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 1.55em;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.5);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── Controls bar ── */
  .controls {
    width: 100%;
    max-width: 640px;
    padding: 12px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 2;
  }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
  }

  .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Voice clone panel ── */
  .voice-panel {
    width: 100%;
    max-width: 720px;
    padding: 0 8px 8px;
    z-index: 2;
    flex-shrink: 0;
  }

  .voice-panel-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--c-surface);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .voice-panel label {
    font-size: 11px;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .voice-panel input[type="file"] {
    font-size: 11px;
    color: var(--c-text);
    max-width: 180px;
  }

  .voice-panel input[type="text"] {
    flex: 1;
    min-width: 120px;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.25);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 12px;
  }

  .voice-panel input[type="text"]::placeholder {
    color: var(--c-text-dim);
  }

  .voice-status {
    font-size: 11px;
    color: var(--c-text-dim);
    margin-left: auto;
  }
  .voice-status.ready { color: var(--c-listen); }

  .btn {
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--c-surface-hover);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.primary {
    background: rgba(129,140,248,0.2);
    border-color: rgba(129,140,248,0.35);
    color: #c7d2fe;
  }
  .btn.active {
    background: rgba(248,113,113,0.15);
    border-color: rgba(248,113,113,0.35);
    color: #fca5a5;
  }

  /* ── Text input bar ── */
  .input-bar {
    width: 100%;
    max-width: 720px;
    padding: 0 8px 20px;
    z-index: 2;
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .input-bar input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 14px;
  }

  .input-bar input[type="text"]::placeholder {
    color: var(--c-text-dim);
  }

  .input-bar input[type="text"]:focus {
    outline: none;
    border-color: rgba(129,140,248,0.4);
  }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Parlor</h1>
  </div>
  <span class="model-label">Gemma 26B · Qwen3-TTS Base · {{STT_LABEL}}</span>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<div class="portal-stack">
  <!-- Audio orb with glow layers -->
  <div id="viewportWrap" class="viewport-wrap loading">
    <div class="viewport-glow"></div>
    <div class="audio-orb" aria-hidden="true">🎙</div>
  </div>

  <!-- Audio waveform visualizer -->
  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <!-- Transcript -->
  <div id="messages" class="transcript"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="state-indicator">
      <div id="stateDot" class="dot loading"></div>
      <span id="stateText">Loading...</span>
    </div>
    <span class="on-device-pill">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
      Cloud L40S
    </span>
  </div>
</div>

<div class="voice-panel">
  <div class="voice-panel-inner">
    <label for="voiceFile">Voix (wav/m4a)</label>
    <input type="file" id="voiceFile" accept=".wav,.m4a,audio/wav,audio/x-m4a,audio/mp4">
    <input type="text" id="refText" placeholder="Transcription ref. (optionnel, meilleure qualité)">
    <button type="button" class="btn primary" id="cloneBtn">Cloner</button>
    <button type="button" class="btn" id="resetVoiceBtn" title="Revenir à la voix par défaut">Voix défaut</button>
    <span id="voiceStatus" class="voice-status">Chargement…</span>
  </div>
</div>

<div class="input-bar">
  <button type="button" class="btn" id="muteBtn" title="Couper le microphone">🎙 Micro</button>
  <input type="text" id="textInput" placeholder="Écrire un message…" autocomplete="off">
  <button type="button" class="btn primary" id="sendBtn">Envoyer</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const messagesDiv = $('messages'), statusEl = $('status');
const stateDot = $('stateDot'), stateText = $('stateText');
const viewportWrap = $('viewportWrap');
const waveformCanvas = $('waveform');
const waveformCtx = waveformCanvas.getContext('2d');

let ws, mediaStream, myvad;
let audioCtx, currentSource;
let state = 'loading';
let ignoreIncomingAudio = false;
let micMuted = false;

const textInput = $('textInput');
const sendBtn = $('sendBtn');
const muteBtn = $('muteBtn');
const voiceFile = $('voiceFile');
const refTextInput = $('refText');
const cloneBtn = $('cloneBtn');
const resetVoiceBtn = $('resetVoiceBtn');
const voiceStatus = $('voiceStatus');

// Streaming audio playback state
let streamSampleRate = 24000;
let streamNextTime = 0;         // When to schedule next chunk
let streamSources = [];         // Active AudioBufferSourceNodes
let streamTtsTime = null;

// ── Waveform Visualizer ──
let analyser, micSource;
const BAR_COUNT = 40;
const BAR_GAP = 3;
let waveformRAF;
let ambientPhase = 0;

function initWaveformCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveformCanvas.getBoundingClientRect();
  waveformCanvas.width = rect.width * dpr;
  waveformCanvas.height = rect.height * dpr;
  waveformCtx.scale(dpr, dpr);
}

function getStateColor() {
  const colors = { listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
  return colors[state] || colors.loading;
}

function drawWaveform() {
  const w = waveformCanvas.getBoundingClientRect().width;
  const h = waveformCanvas.getBoundingClientRect().height;
  waveformCtx.clearRect(0, 0, w, h);

  const barWidth = (w - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
  const color = getStateColor();
  waveformCtx.fillStyle = color;

  let dataArray = null;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
  }

  for (let i = 0; i < BAR_COUNT; i++) {
    let amplitude;
    if (dataArray) {
      // Map bar index to frequency bin
      const binIndex = Math.floor((i / BAR_COUNT) * dataArray.length * 0.6);
      amplitude = dataArray[binIndex] / 255;
    }

    // If no real audio data or very quiet, use ambient drift
    if (!dataArray || amplitude < 0.02) {
      ambientPhase += 0.0001;
      const drift = Math.sin(ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
      amplitude = 0.03 + drift * 0.04;
    }

    const barH = Math.max(2, amplitude * (h - 4));
    const x = i * (barWidth + BAR_GAP);
    const y = (h - barH) / 2;

    waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
    waveformCtx.beginPath();
    const r = Math.min(barWidth / 2, barH / 2, 3);
    waveformCtx.roundRect(x, y, barWidth, barH, r);
    waveformCtx.fill();
  }

  waveformCtx.globalAlpha = 1;
  waveformRAF = requestAnimationFrame(drawWaveform);
}

// ── Dynamic glow intensity for speaking state ──
function updateSpeakingGlow() {
  if (state !== 'speaking' || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;
  // Modulate the glow layers based on audio amplitude
  const intensity = 0.3 + avg * 0.7;
  viewportWrap.style.setProperty('--speak-intensity', intensity);
  const spread = 20 + avg * 60;
  const inner = 15 + avg * 25;
  viewportWrap.querySelector('.viewport-glow').style.boxShadow =
    `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
  viewportWrap.style.boxShadow =
    `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
  requestAnimationFrame(updateSpeakingGlow);
}

// ── State Machine ──
function setState(newState) {
  state = newState;

  // Update state indicator
  stateDot.className = `dot ${newState}`;
  const labels = { loading: 'Loading...', listening: 'Listening', processing: 'Thinking...', speaking: 'Speaking' };
  stateText.textContent = labels[newState] || newState;

  // Update viewport glow class
  viewportWrap.className = `viewport-wrap ${newState}`;

  // Reset inline styles from speaking glow
  if (newState !== 'speaking') {
    viewportWrap.style.boxShadow = '';
    viewportWrap.querySelector('.viewport-glow').style.boxShadow = '';
  }

  // Update CSS custom properties for state color (must use resolved values, not nested var())
  const stateVars = {
    listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
    processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
    speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
    loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
  };
  const [glow, glowDim] = stateVars[newState] || stateVars.loading;
  document.documentElement.style.setProperty('--glow', glow);
  document.documentElement.style.setProperty('--glow-dim', glowDim);

  // Kick off speaking glow animation
  if (newState === 'speaking') requestAnimationFrame(updateSpeakingGlow);

  // Raise VAD threshold during speaking to reduce echo false triggers
  if (myvad) {
    myvad.setOptions({ positiveSpeechThreshold: newState === 'speaking' ? 0.92 : 0.5 });
  }

  // Connect/disconnect mic analyser based on state
  if (newState === 'listening' && mediaStream && audioCtx && analyser) {
    if (!micSource) {
      micSource = audioCtx.createMediaStreamSource(mediaStream);
    }
    try { micSource.connect(analyser); } catch {}
  } else if (micSource && newState !== 'listening') {
    try { micSource.disconnect(analyser); } catch {}
  }

  if (newState === 'listening') refreshMicUi();
}

// ── WebSocket ──
function connect() {
  ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    if (state !== 'loading') setState('listening');
  };
  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') {
      if (msg.transcription) {
        const userMsgs = messagesDiv.querySelectorAll('.msg.user');
        const lastUserMsg = userMsgs[userMsgs.length - 1];
        if (lastUserMsg) {
          const meta = lastUserMsg.querySelector('.meta');
          lastUserMsg.innerHTML = `${msg.transcription}${meta ? meta.outerHTML : ''}`;
        }
      }
      const toolMeta = msg.tools ? formatTools(msg.tools) : '';
      addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`, toolMeta);
    } else if (msg.type === 'audio_start') {
      if (ignoreIncomingAudio) return;
      streamSampleRate = msg.sample_rate || 24000;
      startStreamPlayback();
    } else if (msg.type === 'audio_chunk') {
      if (ignoreIncomingAudio) return;
      queueAudioChunk(msg.audio);
    } else if (msg.type === 'audio_end') {
      if (ignoreIncomingAudio) {
        ignoreIncomingAudio = false;
        stopPlayback();
        setState('listening');
        return;
      }
      streamTtsTime = msg.tts_time;
      const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
      if (meta) meta.textContent += ` · TTS ${msg.tts_time}s`;
    } else if (msg.type === 'error') {
      addMessage('assistant', `⚠ ${msg.message}`, '');
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };
}

function setStatus(cls, text) { statusEl.className = `status-pill ${cls}`; statusEl.textContent = text; }

// ── Microphone only (no camera) ──
async function startMicrophone() {
  mediaStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
  });
}

// ── VAD Handlers ──
let speakingStartedAt = 0;
const BARGE_IN_GRACE_MS = 800; // Ignore VAD triggers shortly after TTS starts (echo)

function handleSpeechStart() {
  if (micMuted) return;
  if (state === 'speaking') {
    // Ignore echo: don't allow barge-in right after TTS starts playing
    if (Date.now() - speakingStartedAt < BARGE_IN_GRACE_MS) {
      console.log('Barge-in suppressed (echo grace period)');
      return;
    }
    stopPlayback();
    ignoreIncomingAudio = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (micMuted) return;
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);

  setState('processing');
  setStatus('processing', 'Processing');
  addMessage('user', '<span class="loading-dots"><span></span><span></span><span></span></span>');

  ws.send(JSON.stringify({ audio: wavBase64 }));
}

// ── Float32 @ 16kHz → WAV base64 ──
function float32ToWavBase64(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ── Streaming Playback ──
function stopPlayback() {
  for (const src of streamSources) {
    try { src.stop(); } catch {}
  }
  streamSources = [];
  currentSource = null;
  streamNextTime = 0;
}

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
  }
}

function startStreamPlayback() {
  stopPlayback();
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  streamNextTime = audioCtx.currentTime + 0.05; // Small initial buffer
  speakingStartedAt = Date.now();
  setState('speaking');
}

function queueAudioChunk(base64Pcm) {
  ensureAudioCtx();

  // Decode base64 -> Int16 PCM -> Float32
  const bin = atob(base64Pcm);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  // Create AudioBuffer and schedule it
  const audioBuffer = audioCtx.createBuffer(1, float32.length, streamSampleRate);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.connect(analyser);

  // Schedule gapless playback
  const startAt = Math.max(streamNextTime, audioCtx.currentTime);
  source.start(startAt);
  streamNextTime = startAt + audioBuffer.duration;

  streamSources.push(source);
  currentSource = source;

  // Clean up when this chunk finishes
  source.onended = () => {
    const idx = streamSources.indexOf(source);
    if (idx !== -1) streamSources.splice(idx, 1);
    // If this was the last chunk and no more are queued, return to listening
    if (streamSources.length === 0 && state === 'speaking') {
      currentSource = null;
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };
}

// ── UI ──
function formatTools(tools) {
  const labels = {
    get_datetime: '🕐 heure',
    calculate: '🔢 calcul',
    respond_to_user: '🗣 réponse',
  };
  const chips = tools
    .filter(t => t.name !== 'respond_to_user')
    .map(t => `<span class="tool-chip" title="${t.summary || ''}">${labels[t.name] || t.name}</span>`)
    .join('');
  return chips ? `<div class="tool-chips">${chips}</div>` : '';
}

function addMessage(role, text, meta, toolsHtml = '') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${text}${toolsHtml}${meta ? `<div class="meta">${meta}</div>` : ''}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ── Text input & mute ──
function sendTextMessage() {
  const text = textInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN || state === 'processing') return;
  if (state === 'speaking') {
    stopPlayback();
    ws.send(JSON.stringify({ type: 'interrupt' }));
  }
  setState('processing');
  setStatus('processing', 'Processing');
  addMessage('user', text);
  ws.send(JSON.stringify({ text }));
  textInput.value = '';
}

function setMicTracksEnabled(enabled) {
  if (!mediaStream) return;
  for (const track of mediaStream.getAudioTracks()) {
    track.enabled = enabled;
  }
}

function refreshMicUi() {
  muteBtn.classList.toggle('active', micMuted);
  muteBtn.textContent = micMuted ? '🔇 Micro coupé' : '🎙 Micro';
  muteBtn.title = micMuted ? 'Réactiver le microphone' : 'Couper le microphone';
  if (micMuted && state === 'listening') {
    stateText.textContent = 'Micro coupé';
  } else if (!micMuted && state === 'listening') {
    stateText.textContent = 'Listening';
  }
}

function toggleMicMute() {
  micMuted = !micMuted;
  setMicTracksEnabled(!micMuted);
  if (myvad) {
    if (micMuted) myvad.pause();
    else myvad.start();
  }
  refreshMicUi();
}

async function refreshVoiceStatus() {
  try {
    const res = await fetch('/voice/status');
    const data = await res.json();
    if (data.status === 'error') throw new Error(data.message);
    applyVoiceStatus(data);
  } catch (err) {
    voiceStatus.textContent = 'Voix indisponible';
    voiceStatus.classList.remove('ready');
    resetVoiceBtn.disabled = true;
  }
}

function applyVoiceStatus(data) {
  if (data.voice_mode === 'clone' && data.clone_ready) {
    const mode = data.mode === 'icl' ? 'ICL' : 'xvec';
    voiceStatus.textContent = `Voix clonée (${mode})`;
    voiceStatus.classList.add('ready');
    resetVoiceBtn.disabled = false;
    return;
  }
  const speaker = (data.speaker || 'serena');
  voiceStatus.textContent = `${speaker.charAt(0).toUpperCase()}${speaker.slice(1)} (défaut)`;
  voiceStatus.classList.add('ready');
  resetVoiceBtn.disabled = true;
}

async function uploadVoiceClone() {
  const file = voiceFile.files?.[0];
  if (!file) {
    voiceStatus.textContent = 'Choisissez un fichier';
    return;
  }
  cloneBtn.disabled = true;
  voiceStatus.textContent = 'Clonage…';
  voiceStatus.classList.remove('ready');

  const form = new FormData();
  form.append('audio', file);
  const ref = refTextInput.value.trim();
  if (ref) form.append('ref_text', ref);

  try {
    const res = await fetch('/voice/clone', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok || data.status === 'error') {
      throw new Error(data.message || res.statusText || 'Échec du clonage');
    }
    applyVoiceStatus(data);
  } catch (err) {
    voiceStatus.textContent = `Erreur: ${err.message}`;
    voiceStatus.classList.remove('ready');
  } finally {
    cloneBtn.disabled = false;
  }
}

async function resetVoiceClone() {
  resetVoiceBtn.disabled = true;
  voiceStatus.textContent = 'Réinitialisation…';
  try {
    const res = await fetch('/voice/reset', { method: 'POST' });
    const data = await res.json();
    if (!res.ok || data.status === 'error') {
      throw new Error(data.message || res.statusText || 'Échec');
    }
    voiceFile.value = '';
    refTextInput.value = '';
    applyVoiceStatus(data);
  } catch (err) {
    voiceStatus.textContent = `Erreur: ${err.message}`;
    voiceStatus.classList.remove('ready');
    await refreshVoiceStatus();
  }
}

// ── Init ──
async function init() {
  initWaveformCanvas();
  window.addEventListener('resize', initWaveformCanvas);

  await startMicrophone();
  connect();

  // Initialize VAD with shared mic stream
  myvad = await vad.MicVAD.new({
    getStream: async () => new MediaStream(mediaStream.getAudioTracks()),
    positiveSpeechThreshold: 0.5,
    negativeSpeechThreshold: 0.25,
    redemptionMs: 600,
    minSpeechMs: 300,
    preSpeechPadMs: 300,
    onSpeechStart: handleSpeechStart,
    onSpeechEnd: handleSpeechEnd,
    onVADMisfire: () => { console.log('VAD misfire (too short)'); },
    onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
    baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
  });

  myvad.start();

  // Init audio context on first user gesture for mic visualizer
  // (browsers require user interaction to create AudioContext)
  const initAudio = () => {
    ensureAudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.removeEventListener('click', initAudio);
    document.removeEventListener('keydown', initAudio);
  };
  document.addEventListener('click', initAudio);
  document.addEventListener('keydown', initAudio);
  // Also try immediately (may work if page had prior interaction)
  ensureAudioCtx();

  setState('listening');

  // Start waveform loop
  drawWaveform();

  sendBtn.addEventListener('click', sendTextMessage);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTextMessage();
    }
  });
  muteBtn.addEventListener('click', toggleMicMute);
  cloneBtn.addEventListener('click', uploadVoiceClone);
  resetVoiceBtn.addEventListener('click', resetVoiceClone);
  refreshVoiceStatus();

  console.log('VAD initialized and listening');
}

init();
</script>
